services:
  postgres:
    image: postgres:15
    container_name: heliora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heliora}
      POSTGRES_USER: ${POSTGRES_USER:-heliora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heliora_pg_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: heliora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5
    container_name: heliora-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/heliora_neo4j_pass}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  rabbitmq:
    image: rabbitmq:3-management
    container_name: heliora-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-heliora}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-heliora_rmq_pass}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: heliora-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-heliora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-heliora_minio_pass}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  rabbitmq_data:
  minio_data:
